name: Update Quantum Hardware Data

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PR created)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  update-hardware-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run hardware data updater
        id: update
        continue-on-error: true
        run: |
          cd $GITHUB_WORKSPACE

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/update_hardware_data.py --dry-run 2>&1 | tee update_output.txt
          else
            python scripts/update_hardware_data.py 2>&1 | tee update_output.txt
          fi

          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: changes
        run: |
          git diff --name-only
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: weekly quantum hardware data update

            Automated update from scheduled GitHub Action.
            Sources checked: company pages, Wikipedia, news feeds, arXiv.
            Review the update log and detected changes before merging.
          branch: auto/quantum-hardware-update
          delete-branch: true
          title: "Weekly quantum hardware data update"
          body: |
            ## Automated Weekly Update

            This PR was created by the scheduled quantum hardware data updater.

            ### What was checked
            - Company hardware/product pages
            - Wikipedia list of quantum processors
            - Quantum news feeds (The Quantum Insider, QC Report)
            - Recent arXiv quant-ph papers

            ### What to review
            - `data/update_log.json` — detected changes and sources checked
            - `README.md` — regenerated table
            - `data/hardware_data.json` — if any manual updates were applied

            ### How to update manually
            1. Edit `data/hardware_data.json` with the corrected values
            2. Run `python scripts/update_hardware_data.py --readme-only` to regenerate README
            3. Commit both files

            ---
            *This PR was auto-generated by [update-quantum-hardware.yml](.github/workflows/update-quantum-hardware.yml)*
          labels: |
            automated
            data-update

      - name: Post summary
        if: always()
        run: |
          echo "## Quantum Hardware Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Changes detected:** ${{ steps.changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "**Updater exit code:** ${{ steps.update.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f update_output.txt ]; then
            echo "<details><summary>Full output</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -100 update_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
